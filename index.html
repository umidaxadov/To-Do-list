<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,">
    <title>To Do list</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" type="module" href="main.js">
</head>
<body>
    <div class="todo">
        <h1 class="todo__title">To Do list</h1>
        <form class="todo__form">
            <div class="todo__field field">
                <label 
                class="field__label"
                for="new-task" >
                New task title
                </label>
                <input class="field__input" 
                id="new-task"
                placeholder=" "
                autocomplete="off"/>
            </div>
            <button class="button" type="submit">
                Add
            </button>
        </form>
        <form class="todo__form">
            <div class="todo__field field">
                <label 
                class="field__label"
                for="search-task" >
                Search task
                </label>
                <input class="field__input" 
                id="search-task"
                placeholder=" "
                autocomplete="off"
                type="search"/>
            </div>
            
        </form>
        <div class="todo__info">
            <div class="todo__total-tasks">
                Total Tasks: <span>0</span>
            </div>
            <button 
            class="todo__delete-all-button"
            type="button">
            Delete All
            </button>
        </div>
        <ul class="todo__list">
            <li class="todo__item todo-item">
                <input
                class="todo-item__checkbox"
                id="todo-1"
                type="checkbox">
                <label class="todo-item__label" for="todo-1">
                    Todo 1
                </label>
                <button 
                class="todo-item__delete-button"
                type="button"
                aria-label="Delete"
                title="Delete">

                </button>
            </li>
             <li class="todo__item todo-item">
                <input
                class="todo-item__checkbox"
                id="todo-1"
                type="checkbox">
                <label class="todo-item__label" for="todo-1">
                    Todo 1
                </label>
                <button 
                class="todo-item__delete-button"
                type="button"
                aria-label="Delete"
                title="Delete">

                </button>
            </li>
        </ul>
        <div class="todo__empty-message"></div>
    </div>
</body>
</html>
