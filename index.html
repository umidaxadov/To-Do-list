<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,">
    <title>To Do list</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" type="module" href="main.js">
</head>
<body>
    <div class="todo">
        <h1 class="todo__title">To Do list</h1>
        <form class="todo__form">
            <div class="todo__field field">
                <label 
                class="field__label"
                for="new-task" >
                New task title
                </label>
                <input class="field__input" 
                id="new-task"
                placeholder=" "
                autocomplete="off"/>
            </div>
            <button class="button" type="submit">
                Add
            </button>
        </form>
        <form class="todo__form">
            <div class="todo__field field">
                <label 
                class="field__label"
                for="search-task" >
                Search task
                </label>
                <input class="field__input" 
                id="search-task"
                placeholder=" "
                autocomplete="off"
                type="search"/>
            </div>
            
        </form>
        <div class="todo__info">
            <div class="tod__total-tasks">
                Total Tasks: <span>0</span>
            </div>
            
        </div>
    </div>
</body>
</html>
